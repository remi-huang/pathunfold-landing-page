<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PathUnfold Hero Pixel Pass</title>
    <style>
      :root {
        --bg: #fdfefa;
        --text: #000;
        --btn-top: rgb(237, 155, 44);
        --btn-bottom: rgb(206, 131, 6);
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      }

      /* ===== Header (按 Framer 桌面值) ===== */
      .header {
        position: sticky;
        top: 0;
        z-index: 20;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 40px;
        background: #fdfefa;
        box-shadow: 0 1px 2px #00000040;
      }
      .header-left { display: flex; align-items: center; gap: 20px; }
      .logo {
        width: 48px;
        height: 48px;
        border-radius: 10px;
        overflow: hidden;
        flex: none;
      }
      .logo img { width: 100%; height: 100%; object-fit: cover; }
      .nav { display: flex; gap: 20px; font-size: 14px; }

      .header-right { display: flex; align-items: center; gap: 22px; }
      .btn-wrap {
        cursor: pointer;
        width: 95px;
        height: 34px;
        position: relative;
        flex: none;
      }
      .btn-base,
      .btn-top {
        width: 95px;
        height: 28px;
        border-radius: 5px;
        border: 1px solid rgb(165, 125, 55);
        position: absolute;
        left: 0;
      }
      .btn-base { bottom: 0; background: var(--btn-bottom); }
      .btn-top {
        top: 0;
        border-color: rgb(179, 121, 25);
        background: var(--btn-top);
        display: grid;
        place-items: center;
        font-size: 12px;
        font-weight: 700;
      }

      .avatar {
        width: 22px;
        height: 22px;
        border: 1.5px solid #111;
        border-radius: 50%;
        position: relative;
      }
      .avatar::before {
        content: "";
        position: absolute;
        width: 6px;
        height: 6px;
        border: 1.5px solid #111;
        border-radius: 50%;
        left: 50%;
        top: 3px;
        transform: translateX(-50%);
      }

      /* ===== Hero (按抓到的关键尺寸) ===== */
      .hero-shell {
        width: 100%;
        display: flex;
        justify-content: center;
        padding: 80px 0 50px 100px;
        background: #fdfdfa;
      }
      .hero-inner {
        max-width: 1200px;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 70px;
      }

      .hero-kicker {
        font-family: "Utara Variable", Inter, sans-serif;
        font-size: 100px;
        font-weight: 1000;
        line-height: 1;
        margin: 0;
      }

      .hero-row {
        width: 100%;
        display: flex;
        align-items: stretch;
        justify-content: flex-start;
        gap: 91px;
      }

      .hero-left {
        flex: 1 0 0;
        min-width: 0;
        height: 339px;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .lighting {
        display: flex;
        align-items: flex-start;
        gap: 0;
        width: 407px;
        height: 339px;
      }
      .switch {
        width: 41px;
        height: 388px;
        cursor: pointer;
        flex: none;
        overflow: visible;
      }
      .switch img { width: 100%; height: 100%; object-fit: cover; }
      .video-box {
        width: 366px;
        height: 339px;
        position: relative;
        flex: none;
      }
      .video-box video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        background: transparent;
      }

      .hero-right {
        width: min-content;
        height: 339px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: flex-start;
        gap: 19px;
      }

      .hero-copy-top {
        display: flex;
        flex-direction: column;
        gap: 19px;
      }
      .hero-title {
        font-family: "Utara Variable", Inter, sans-serif;
        font-size: 100px;
        font-weight: 1000;
        line-height: 1;
        margin: 0;
        white-space: nowrap;
      }
      .hero-desc {
        font-size: 15px;
        line-height: 1.6;
        margin: 0;
        white-space: nowrap;
      }
      .hero-actions {
        display: flex;
        gap: 18px;
        align-items: center;
        padding: 2px 0;
        margin-top: 0;
        transform: translateY(-40px);
      }
      .hero-actions .btn-wrap {
        width: 120px;
        height: 37px;
      }
      .hero-actions .btn-wrap .btn-base,
      .hero-actions .btn-wrap .btn-top {
        width: 120px;
        height: 28px;
      }
      .hero-actions .btn-ghost {
        width: 140px;
        height: 37px;
      }
      .hero-actions .btn-ghost .btn-base,
      .hero-actions .btn-ghost .btn-top {
        width: 140px;
      }
      .btn-ghost .btn-top {
        background: #fff;
        color: #5c5c5c;
      }

      .placeholder {
        height: 1200px;
      }

      @media (max-width: 1200px) {
        .hero-shell { padding: 48px 20px; }
        .hero-kicker, .hero-title { font-size: 72px; }
        .hero-row { gap: 40px; }
      }
      @media (max-width: 900px) {
        .header { padding: 10px 16px; }
        .hero-row { flex-direction: column; }
        .hero-kicker, .hero-title { font-size: 48px; white-space: normal; }
        .hero-desc { white-space: normal; }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <img src="https://framerusercontent.com/images/EaDMzcIudOA0yZYNPkHpGE68ig.png?width=500&height=500" alt="logo" />
        </div>
        <nav class="nav">
          <span>社区</span>
          <span>课程</span>
          <span>FAQ</span>
        </nav>
      </div>
      <div class="header-right">
        <div class="btn-wrap">
          <div class="btn-base"></div>
          <div class="btn-top">加入我们</div>
        </div>
        <div class="avatar"></div>
      </div>
    </header>

    <main class="hero-shell">
      <section class="hero-inner">
        <h1 class="hero-kicker">用AI「发电」</h1>

        <div class="hero-row">
          <div class="hero-left">
            <div class="lighting" id="lighting">
              <button class="switch" id="toggleBtn" aria-label="切换灯光" style="border:0;background:transparent;padding:0;">
                <img id="switchImg" src="hero section lighting/关灯开关.avif" alt="开关" />
              </button>
              <div class="video-box">
                <video id="offVideo" autoplay muted loop playsinline preload="metadata">
                  <source src="hero section lighting/关灯效果.mp4" type="video/mp4" />
                </video>
                <video id="onVideo" muted loop playsinline preload="metadata" style="display:none;">
                  <source src="hero section lighting/开灯效果video.mp4" type="video/mp4" />
                </video>
              </div>
            </div>
          </div>

          <div class="hero-right">
            <div class="hero-copy-top">
              <h2 class="hero-title">拥抱你的新身份</h2>
              <p class="hero-desc">与同行者一起，用 vibe coding 把想法变成现实。<br />让AI帮你从“工具人”走向 problem solver 与创造者，完成思维和身份的升级。</p>
            </div>
            <div class="hero-actions">
              <div class="btn-wrap">
                <div class="btn-base"></div>
                <div class="btn-top">成为早期会员</div>
              </div>
              <div class="btn-wrap btn-ghost">
                <div class="btn-base"></div>
                <div class="btn-top">了解我们的故事</div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div class="placeholder"></div>

    <script>
      const toggleBtn = document.getElementById('toggleBtn');
      const switchImg = document.getElementById('switchImg');
      const offVideo = document.getElementById('offVideo');
      const onVideo = document.getElementById('onVideo');
      let on = false;

      function safePlay(v) {
        const p = v.play();
        if (p && p.catch) p.catch(() => {});
      }

      toggleBtn.addEventListener('click', () => {
        on = !on;
        if (on) {
          switchImg.src = 'hero section lighting/开灯开关.avif';
          offVideo.style.display = 'none';
          onVideo.style.display = 'block';
          onVideo.currentTime = 0;
          safePlay(onVideo);
          offVideo.pause();
        } else {
          switchImg.src = 'hero section lighting/关灯开关.avif';
          onVideo.style.display = 'none';
          offVideo.style.display = 'block';
          offVideo.currentTime = 0;
          safePlay(offVideo);
          onVideo.pause();
        }
      });
    </script>
  </body>
</html>
